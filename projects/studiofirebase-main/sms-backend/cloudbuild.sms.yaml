# Cloud Build to build and deploy the SMS OTP service to Cloud Run
# Usage (async mode to avoid API rate limits):
# gcloud builds submit --config=sms-backend/cloudbuild.sms.yaml \
#   --substitutions=_SERVICE=sms-otp-service,_REGION=us-central1,_PROJECT=$PROJECT_ID \
#   --async

substitutions:
  _SERVICE: sms-otp-service
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY
  # Enable dynamic variable substitutions at build time
  dynamic_substitutions: true

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build image'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID', '.']
    dir: 'sms-backend'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push image'
    args: ['push', 'gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy to Cloud Run'
    entrypoint: gcloud
    args:
      [
        'run','deploy','${_SERVICE}',
        '--image','gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID',
        '--region','${_REGION}',
        '--platform','managed',
        '--allow-unauthenticated',
        '--max-instances','3',
        '--cpu','1',
        '--memory','512Mi',
        '--set-env-vars','NODE_ENV=production',
        '--set-env-vars','ALLOWED_ORIGINS=$_ALLOWED_ORIGINS',
        '--set-env-vars','USE_FIREBASE_PHONE=$_USE_FIREBASE_PHONE',
        '--set-env-vars','FIREBASE_WEB_API_KEY=$_FIREBASE_WEB_API_KEY',
        '--set-env-vars','SMS_API_KEY=$_SMS_API_KEY',
        '--set-env-vars','OTP_TTL_SECONDS=$_OTP_TTL_SECONDS',
        '--set-env-vars','OTP_DIGITS=$_OTP_DIGITS',
        '--set-env-vars','OTP_RESEND_WINDOW_SECONDS=$_OTP_RESEND_WINDOW_SECONDS',
        '--set-env-vars','MAX_SENDS_PER_HOUR=${_MAX_SENDS_PER_HOUR}',
        '--set-env-vars','MAX_VERIFY_ATTEMPTS=$_MAX_VERIFY_ATTEMPTS',
        '--set-env-vars','TWILIO_ACCOUNT_SID=$_TWILIO_ACCOUNT_SID',
        '--set-env-vars','TWILIO_AUTH_TOKEN=$_TWILIO_AUTH_TOKEN',
        '--set-env-vars','TWILIO_FROM=$_TWILIO_FROM'
      ]

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID'

# Define the required substitutions when running the build
#   _SMS_API_KEY           -> API key that frontend must send in x-api-key header
#   _TWILIO_*              -> Twilio credentials
#   Optional tuning: _OTP_TTL_SECONDS, _OTP_DIGITS, _OTP_RESEND_WINDOW_SECONDS, _MAX_SENDS_PER_HOUR, _MAX_VERIFY_ATTEMPTS
